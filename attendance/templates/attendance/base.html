<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Matrix Master Attendance{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f6f9;
      color: #333;
      min-height: 100vh;
    }
    nav {
      background: #1a1a2e;
      color: #fff;
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    nav .brand { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.5px; }
    nav a { color: #ccc; text-decoration: none; margin-left: 1.25rem; font-size: 0.9rem; }
    nav a:hover { color: #fff; }
    .container {
      max-width: 860px;
      margin: 2.5rem auto;
      padding: 0 1rem;
    }
    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 2rem;
    }
    h1 { font-size: 1.6rem; margin-bottom: 0.4rem; }
    h2 { font-size: 1.25rem; margin-bottom: 1rem; color: #444; }
    p { line-height: 1.6; margin-bottom: 0.75rem; color: #555; }
    .btn {
      display: inline-block;
      padding: 0.6rem 1.4rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #1a1a2e; color: #fff; }
    .btn-success { background: #28a745; color: #fff; }
    .btn-danger  { background: #dc3545; color: #fff; }
    .messages { margin-bottom: 1rem; }
    .messages li {
      list-style: none;
      padding: 0.6rem 1rem;
      border-radius: 6px;
      margin-bottom: 0.4rem;
      background: #d4edda;
      color: #155724;
    }
    .messages li.error { background: #f8d7da; color: #721c24; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { padding: 0.7rem 1rem; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #f0f0f0; font-weight: 600; }
    tr:hover td { background: #fafafa; }
    .info-row { display: flex; gap: 1.5rem; flex-wrap: wrap; margin: 1rem 0; }
    .info-item { flex: 1; min-width: 160px; }
    .info-item .label { font-size: 0.75rem; text-transform: uppercase; color: #888; margin-bottom: 0.2rem; }
    .info-item .value { font-size: 1.05rem; font-weight: 600; }
    .badge-valid   { color: #155724; background: #d4edda; padding: 2px 8px; border-radius: 20px; font-size: 0.8rem; }
    .badge-expired { color: #721c24; background: #f8d7da; padding: 2px 8px; border-radius: 20px; font-size: 0.8rem; }
  </style>
</head>
<body>
  <nav>
    <span class="brand">Matrix Master</span>
    <span>
      {% if user.is_authenticated %}
        {% if user.is_staff %}
          <a href="{% url 'qr_generator' %}">QR Generator</a>
          <a href="{% url 'date_list' %}">Dates</a>
        {% endif %}
        <form method="post" action="{% url 'logout' %}" style="display:inline;">
          {% csrf_token %}
          <button type="submit" style="background:none;border:none;color:#ccc;cursor:pointer;font-size:0.9rem;padding:0;margin-left:1.25rem;">Logout ({{ user.username }})</button>
        </form>
      {% else %}
        <a href="{% url 'login' %}">Login</a>
      {% endif %}
    </span>
  </nav>

  <div class="container">
    {% if messages %}
      <ul class="messages">
        {% for message in messages %}
          <li class="{{ message.tags }}">{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}

    {% block content %}{% endblock %}
  </div>
</body>
</html>
