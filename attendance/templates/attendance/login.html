{% extends "attendance/base.html" %}
{% block title %}Login — Matrix Master{% endblock %}

{% block content %}
<div class="card" style="max-width:420px;margin:0 auto;">
  <h1>Login</h1>
  <p>Sign in to register your attendance.</p>

  <form method="post" style="margin-top:1.5rem;">
    {% csrf_token %}
    {% if form.errors %}
      <p style="color:#dc3545;margin-bottom:1rem;">Invalid username or password.</p>
    {% endif %}

    <div style="margin-bottom:1rem;">
      <label style="display:block;font-weight:600;margin-bottom:0.3rem;">Username</label>
      <input type="text" name="username" autofocus autocomplete="username"
             style="width:100%;padding:0.5rem 0.75rem;border:1px solid #ccc;border-radius:6px;font-size:1rem;">
    </div>

    <div style="margin-bottom:1.5rem;">
      <label style="display:block;font-weight:600;margin-bottom:0.3rem;">Password</label>
      <input type="password" name="password" autocomplete="current-password"
             style="width:100%;padding:0.5rem 0.75rem;border:1px solid #ccc;border-radius:6px;font-size:1rem;">
    </div>

    <input type="hidden" name="next" value="{{ next }}">
    <button type="submit" class="btn btn-primary" style="width:100%;">Sign In</button>
  </form>
</div>
{% endblock %}
